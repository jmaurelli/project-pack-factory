site_name: AlgoSec Diagnostic Playbooks
site_description: Target-generated diagnostic playbooks for benchmark-smoke
theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
  features:
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true
extra_css:
  - stylesheets/extra.css
nav:
  - Home: index.md
